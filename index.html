<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meme Popularity Bubbles</title>
    <style>
      :root {
        --bg-start: #fff7ed;
        --bg-end: #ffedd5;
        --card: #ffffffcc;
        --text: #1f2937;
        --muted: #6b7280;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top left, var(--bg-start), var(--bg-end));
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .app {
        width: min(1100px, 100%);
        background: var(--card);
        border: 1px solid #e5e7eb;
        border-radius: 18px;
        backdrop-filter: blur(8px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        padding: 20px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: clamp(1.3rem, 2.4vw, 2rem);
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      #status {
        margin-top: 10px;
        min-height: 22px;
        font-size: 0.95rem;
      }

      #chart {
        margin-top: 18px;
        width: 100%;
        height: min(70vh, 720px);
        border-radius: 14px;
        background: linear-gradient(180deg, #fff 0%, #fffbf5 100%);
      }

      .label {
        fill: #111827;
        text-anchor: middle;
        pointer-events: none;
        font-weight: 600;
      }

      .value {
        fill: #374151;
        text-anchor: middle;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <h1>Most Popular Memes</h1>
      <p>Bubble size reflects popularity score.</p>
      <div id="status">Loading memes from Supabase...</div>
      <svg id="chart" role="img" aria-label="Bubble chart of meme popularity"></svg>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script>
      const SUPABASE_URL = "https://qihsgnfjqmkjmoowyfbn.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpaHNnbmZqcW1ram1vb3d5ZmJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDk1Mjc0MDAsImV4cCI6MjA2NTEwMzQwMH0.c9UQS_o2bRygKOEdnuRx7x7PeSf_OUGDtf9l3fMqMSQ";

      const statusEl = document.getElementById("status");
      if (!window.d3 || !window.supabase || !window.supabase.createClient) {
        statusEl.textContent =
          "Error: Could not load chart libraries. Check internet access and script loading.";
        throw new Error("D3 or Supabase browser library failed to load.");
      }

      const svg = d3.select("#chart");
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      let cachedItems = [];

      async function loadMemes() {
        const query = supabase
          .from("memes")
          .select("id, title, name, popularity, likes, views")
          .order("popularity", { ascending: false, nullsFirst: false })
          .limit(35);

        const { data, error } = await query;

        if (error) {
          throw new Error(
            `${error.message}. Check that table 'memes' exists and has read access.`
          );
        }

        if (!data || data.length === 0) {
          throw new Error("No meme rows were returned from 'memes'.");
        }

        return data
          .map((row) => {
            const label = row.title ?? row.name ?? `Meme #${row.id ?? "?"}`;
            const popularity =
              Number(row.popularity) || Number(row.likes) || Number(row.views) || 0;
            return { label, popularity };
          })
          .filter((row) => row.popularity > 0)
          .sort((a, b) => b.popularity - a.popularity);
      }

      function drawBubbles(items) {
        const width = document.getElementById("chart").clientWidth;
        const height = document.getElementById("chart").clientHeight;

        svg.selectAll("*").remove();
        svg.attr("viewBox", `0 0 ${width} ${height}`);

        const root = d3
          .hierarchy({ children: items })
          .sum((d) => d.popularity)
          .sort((a, b) => b.value - a.value);

        d3.pack().size([width, height]).padding(6)(root);

        const color = d3.scaleSequential(d3.interpolateYlOrRd).domain([
          d3.max(items, (d) => d.popularity),
          d3.min(items, (d) => d.popularity),
        ]);

        const node = svg
          .selectAll("g")
          .data(root.leaves())
          .join("g")
          .attr("transform", (d) => `translate(${d.x},${d.y})`);

        node
          .append("circle")
          .attr("r", 0)
          .attr("fill", (d) => color(d.data.popularity))
          .attr("fill-opacity", 0.86)
          .attr("stroke", "#9a3412")
          .attr("stroke-width", 1.2)
          .transition()
          .duration(550)
          .attr("r", (d) => d.r);

        node
          .append("text")
          .attr("class", "label")
          .style("font-size", (d) => `${Math.max(10, d.r / 4.8)}px`)
          .attr("dy", "0.05em")
          .text((d) => d.data.label.slice(0, 18));

        node
          .append("text")
          .attr("class", "value")
          .style("font-size", (d) => `${Math.max(9, d.r / 6)}px`)
          .attr("dy", "1.35em")
          .text((d) => d.data.popularity.toLocaleString());
      }

      async function init() {
        try {
          const items = await loadMemes();
          if (!items.length) {
            throw new Error("Rows loaded, but no popularity values were greater than zero.");
          }
          cachedItems = items;
          drawBubbles(items);
          statusEl.textContent = `Loaded ${items.length} memes.`;
        } catch (err) {
          statusEl.textContent = `Error: ${err.message}`;
          console.error(err);
        }
      }

      window.addEventListener("resize", () => {
        if (cachedItems.length) drawBubbles(cachedItems);
      });
      init();
    </script>
  </body>
</html>
